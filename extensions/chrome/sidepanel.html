<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Side Panel</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-hover: #f9fafb;
      --text: #111827;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-text: #ffffff;
      --radius: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .panel-header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: var(--radius);
      max-width: 85%;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message--user {
      background: var(--primary);
      color: var(--primary-text);
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .message--assistant {
      background: var(--bg-hover);
      color: var(--text);
      align-self: flex-start;
      border-bottom-left-radius: 2px;
      border: 1px solid var(--border);
    }

    .message--system {
      background: #fefce8;
      color: #854d0e;
      align-self: center;
      font-size: 12px;
      text-align: center;
      border: 1px solid #fde68a;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .input-area input:focus {
      border-color: var(--primary);
    }

    .input-area button {
      padding: 8px 16px;
      background: var(--primary);
      color: var(--primary-text);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .input-area button:hover {
      background: var(--primary-hover);
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-secondary);
      text-align: center;
      padding: 32px;
    }

    .empty-state .emoji {
      font-size: 32px;
    }

    .empty-state h3 {
      font-size: 14px;
      color: var(--text);
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="panel-header">
    <img src="icons/icon32.png" alt="RAG">
    <h1>RAG Assistant</h1>
  </div>

  <div id="chat-area" class="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="emoji">💬</div>
      <h3>Ask anything</h3>
      <p>Select text on any page and press Ctrl+Shift+A, or type a question below.</p>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="query-input" placeholder="Ask about this page..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
