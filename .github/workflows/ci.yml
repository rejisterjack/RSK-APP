name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2"

jobs:
  # ─────────────────────────────────────────────
  # Quality Gates — must pass before deploy
  # ─────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Lint (Biome)
        run: bun run check

      - name: Type Check
        run: bun run type-check

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run unit tests
        run: bun run test:run
        env:
          # Minimal env vars for test context
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"
          NEXTAUTH_SECRET: "test-secret-at-least-32-characters-long!!"
          NEXTAUTH_URL: "http://localhost:3000"
          OPENROUTER_API_KEY: "sk-or-v1-test-key"
          NODE_ENV: "test"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"
          NEXTAUTH_SECRET: "test-secret-at-least-32-characters-long!!"
          NEXTAUTH_URL: "http://localhost:3000"
          OPENROUTER_API_KEY: "sk-or-v1-test-key"
          NODE_ENV: "production"

  # ─────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────
  security:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (critical)
        run: npm audit --audit-level=critical

      - name: Audit dependencies (high)
        if: always()
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────
  # E2E Tests (only on main branch pushes)
  # ─────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e:chrome
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/testdb"
          NEXTAUTH_SECRET: "test-secret-at-least-32-characters-long!!"
          NEXTAUTH_URL: "http://localhost:3000"
          OPENROUTER_API_KEY: "sk-or-v1-test-key"
          NODE_ENV: "test"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────
  # RAG Evaluation (manual or scheduled)
  # ─────────────────────────────────────────────
  rag-eval:
    name: RAG Quality Eval
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: Run RAG eval against staging
        run: |
          npx tsx scripts/eval.ts \
            --dataset tests/evaluation/fixtures/golden-dataset.json \
            --api-url ${{ vars.EVAL_API_URL || 'http://localhost:3000' }} \
            --ci \
            --min-precision 0.5 \
            --min-recall 0.4 \
            --max-latency 10000 \
            --format json \
            --output eval-results/ci-report.json
        env:
          EVAL_API_KEY: ${{ secrets.EVAL_API_KEY }}

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rag-eval-report
          path: eval-results/
          retention-days: 30
