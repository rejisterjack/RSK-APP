name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deployment_url:
        description: 'Deployment URL to test'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.2"

jobs:
  # ==========================================
  # End-to-End Tests with PostgreSQL
  # ==========================================
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ragdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      POSTGRES_PRISMA_URL: postgres://postgres:postgres@localhost:5432/ragdb_test?pgbouncer=true&connect_timeout=15
      POSTGRES_URL_NON_POOLING: postgres://postgres:postgres@localhost:5432/ragdb_test
      NEXTAUTH_SECRET: test-secret-key-for-e2e-only
      NEXTAUTH_URL: http://localhost:3000
      OPENAI_API_KEY: sk-test-key-for-e2e-only
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run database migrations
        run: bun run db:migrate:prod

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: bun run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.deployment_url || 'http://localhost:3000' }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

      - name: Upload test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 30

  # ==========================================
  # E2E Tests against Deployment
  # ==========================================
  e2e-deployment:
    name: E2E Tests against Deployment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests against deployment
        run: bun run test:e2e --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.deployment_url }}
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deployment
          path: |
            playwright-report/
            test-results/
          retention-days: 30
